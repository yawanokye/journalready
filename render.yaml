services:
  - type: web
    name: journalready-ai
    runtime: python
    region: oregon
    plan: starter
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENALEX_MAILTO
        value: aadam@ucc.edu.gh
      - key: CROSSREF_MAILTO
        value: aadam@ucc.edu.gh
