services:
  - type: web
    name: articleready-ai
    runtime: python
    region: oregon
    plan: starter
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: articleready-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_ARTICLE_IDEA_MODEL
        value: deepseek-v4-pro
      - key: DEEPSEEK_ARTICLE_IDEA_THINKING
        value: "1"
      - key: DEEPSEEK_ARTICLE_IDEA_REASONING_EFFORT
        value: high
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ARTICLE_TERRA_MODEL
        value: gpt-5.6-terra
      - key: OPENAI_ARTICLE_SOL_MODEL
        value: gpt-5.6-sol
      - key: OPENAI_ARTICLE_REVISION_MODEL
        value: gpt-5.6-sol
      - key: OPENAI_ARTICLE_HUMANIZER_MODEL
        value: gpt-5.6-terra
      - key: ARTICLEREADY_HUMANIZER_MODE
        value: balanced
      - key: ARTICLEREADY_HUMANIZER_MODEL_PASS
        value: "1"
      - key: OPENALEX_MAILTO
        value: aadam@ucc.edu.gh
      - key: CROSSREF_MAILTO
        value: aadam@ucc.edu.gh

      - key: ARTICLEREADY_PAYMENT_REQUIRED
        value: "1"
      - key: APP_BASE_URL
        value: https://articlereadyai.com
      - key: ARTICLEREADY_SQLITE_DB_PATH
        value: /var/data/articleready_payments.db
      - key: ARTICLEREADY_REVIEW_DB_PATH
        value: /var/data/articleready_review_workspace.db
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ARTICLEREADY_PAYSTACK_USD_TO_GHS_RATE
        value: "15.00"
      - key: ARTICLEREADY_DEVELOPER_ACCESS_ENABLED
        value: "0"
      - key: ARTICLEREADY_DEVELOPER_ACCESS_EMAIL
        sync: false
      - key: ARTICLEREADY_DEVELOPER_ACCESS_CODE_SHA256
        sync: false
      - key: ARTICLEREADY_DEVELOPER_ACCESS_SECRET
        sync: false
      - key: ARTICLEREADY_DEVELOPER_SESSION_HOURS
        value: "12"

# Long article and batch writing optional environment variables:
# ARTICLEREADY_BATCH_DRAFT_WORD_THRESHOLD=6500
# ARTICLEREADY_ARTICLE_MAX_OUTPUT_TOKENS=24000
# ARTICLEREADY_ARTICLE_HARD_OUTPUT_CAP=60000
