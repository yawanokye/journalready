services:
  - type: web
    name: journalready
    runtime: python
    plan: starter
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /health
    maxShutdownDelaySeconds: 120
    disk:
      name: articleready-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ARTICLE_STANDARD_MODEL
        value: gpt-5-mini
      - key: OPENAI_ARTICLE_ADVANCED_MODEL
        value: gpt-5.1
      - key: OPENAI_ARTICLE_REVISION_MODEL
        value: gpt-5.1
      - key: OPENAI_ARTICLE_FALLBACK_MODELS
        value: gpt-5.1,gpt-5,gpt-5-mini
      - key: OPENAI_ARTICLEREADY_TIMEOUT_SECONDS
        value: "180"
      - key: OPENAI_ARTICLEREADY_SDK_RETRIES
        value: "2"
      - key: OPENAI_ARTICLEREADY_ATTEMPTS_PER_MODEL
        value: "2"
      - key: OPENAI_ARTICLEREADY_CHAT_FALLBACK
        value: "1"
      - key: ARTICLEREADY_REVISION_USE_AI
        value: "1"
      - key: ARTICLEREADY_ALLOW_REVISION_FALLBACK
        value: "0"
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
      - key: OPENALEX_MAILTO
        sync: false
      - key: CROSSREF_MAILTO
        sync: false
      - key: ARTICLEREADY_PAYMENT_REQUIRED
        value: "1"
      - key: APP_BASE_URL
        value: https://articlereadyai.com
      - key: ARTICLEREADY_SQLITE_DB_PATH
        value: /var/data/articleready_payments.db
      - key: ARTICLEREADY_REVIEW_DB_PATH
        value: /var/data/articleready_review_workspace.db
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ARTICLEREADY_DEVELOPER_ACCESS_ENABLED
        value: "0"
      - key: ARTICLEREADY_DEVELOPER_ACCESS_EMAIL
        sync: false
      - key: ARTICLEREADY_DEVELOPER_ACCESS_CODE_SHA256
        sync: false
      - key: ARTICLEREADY_DEVELOPER_ACCESS_SECRET
        generateValue: true
      - key: ARTICLEREADY_DEVELOPER_SESSION_HOURS
        value: "12"
      - key: ARTICLEREADY_ALLOWED_HOSTS
        value: articlereadyai.com,www.articlereadyai.com,*.onrender.com,localhost,127.0.0.1,testserver
      - key: ARTICLEREADY_ALLOWED_ORIGINS
        value: https://articlereadyai.com,https://www.articlereadyai.com
      - key: ARTICLEREADY_TRUST_PROXY_HEADERS
        value: "1"
      - key: ARTICLEREADY_RATE_LIMIT_ENABLED
        value: "1"
      - key: ARTICLEREADY_HSTS_ENABLED
        value: "1"
      - key: ARTICLEREADY_ENABLE_API_DOCS
        value: "0"
      - key: ARTICLEREADY_SECURITY_CONTACT
        value: mailto:aadam@ucc.edu.gh
